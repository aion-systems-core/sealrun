# Finance-style bundle — requires decision_timestamp and approver in evidence fields
name: regulated-finance
version: 1.0.0
controls:
  allowed_models:
    - gpt-4o-mini
  allowed_seeds:
    - 42
  allowed_external_calls:
    - https://api.openai.com
  required_evidence_fields:
    - trace_id
    - policy_id
    - tenant_id
    - decision_timestamp
    - approver
