name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main
      - feature/**

defaults:
  run:
    shell: bash

jobs:
  ci:
    name: fmt-clippy-build-test
    runs-on: ubuntu-latest

    steps:
      # Checkout source and install stable Rust toolchain.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Cache Cargo registry/target metadata to speed up CI.
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}-v1

      # Formatting gate.
      - name: rustfmt
        run: cargo fmt --all -- --check

      # Lint gate.
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      # Build all workspace crates.
      - name: build
        run: cargo build --workspace --all-targets

      # Run all workspace tests.
      - name: test
        run: cargo test --workspace --all-targets

  security-gate:
    name: security-gate
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}-v1

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit (deny warnings)
        run: cargo audit --deny warnings

  smoke-e2e:
    name: smoke-e2e
    runs-on: ubuntu-latest
    needs: security-gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}-v1

      - name: Run E2E smoke tests
        run: bash scripts/smoke_e2e.sh

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: smoke_report.json
          if-no-files-found: error

  golden-tests:
    name: golden-tests
    runs-on: ubuntu-latest
    needs: security-gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}-v1

      - name: Run golden checker
        run: cargo test -p aion-cli --test golden_test

      - name: Upload golden reports (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-reports
          path: golden_reports/
          if-no-files-found: ignore

  ai-python:
    name: ai-python
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests mypy

      - name: Lint (syntax)
        run: python -m py_compile sealrun_ai/*.py

      - name: Install type stubs
        run: pip install types-requests

      - name: Type check
        run: mypy --ignore-missing-imports sealrun_ai

      - name: Unit tests
        run: python -m unittest discover -s sealrun_ai/tests -p "test_*.py"

      - name: SealRun selftest
        run: ./target/release/sealrun --help || cargo run -p aion-cli -- --help

      - name: AI selftest (dummy mode)
        run: |
          python -c "from sealrun_ai.config import AIConfig, OllamaConfig, SandboxConfig; from sealrun_ai.ai_runner import AITestRunner; cfg=AIConfig(ollama=OllamaConfig(base_url='http://127.0.0.1:9', model='qwen2.5:7b'), sandbox=SandboxConfig(sealrun_bin='target/release/sealrun')); r=AITestRunner(cfg); print(r.generator.generate_engine_tests(2))"
